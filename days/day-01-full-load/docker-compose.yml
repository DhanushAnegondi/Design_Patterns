# Day 01 — Full Loader on S3, fully in Docker.
#
#   localstack : a free, local stand-in for Amazon S3 (real S3 API, no AWS account, no cost,
#                no API limits). Our bucket lives here.
#   loader     : a small Python container that runs code/run.py against that S3.
#
# Run it:     docker compose up --build --abort-on-container-exit
# Clean up:   docker compose down -v
services:
  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3
      DEBUG: "0"
    ports:
      - "4566:4566"          # so you can poke the S3 API from your host if you want

  loader:
    build: .
    depends_on:
      - localstack
    environment:
      USE_MOTO: "0"                              # use a real S3 endpoint, not the in-process mock
      AWS_ENDPOINT_URL: http://localstack:4566   # ...which is LocalStack, on the compose network
      AWS_ACCESS_KEY_ID: test                    # LocalStack accepts any credentials
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      S3_BUCKET: silver-layer
      DATASET_DIR: /data
    volumes:
      - ./code:/app/code:ro                      # the loader code
      - ../../datasets/full-load:/data:ro        # the device snapshots
    working_dir: /app
    command: ["python", "code/run.py"]
